<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAKE MP</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="lobby">
    <h1>SNAKE MP</h1>
    <div class="subtitle">2-PLAYER EDITION</div>
    <div id="lobby-main" class="lobby-row">
      <button id="btn-host">HOST</button>
      <button id="btn-join-show">JOIN</button>
    </div>
    <div id="join-panel" class="hidden" style="flex-direction:column;align-items:center;gap:14px;">
      <input id="code-input" maxlength="4" placeholder="????"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')" autocomplete="off" autocorrect="off"
        spellcheck="false">
      <button id="btn-connect">CONNECT</button>
      <span class="hint">4-LETTER ROOM CODE</span>
    </div>
    <div id="waiting" class="hidden" style="flex-direction:column;align-items:center;gap:14px;">
      <span class="hint">ROOM CODE</span>
      <div class="code-big" id="room-code-display" title="Click to copy link"></div>
      <span class="hint copy-hint">CLICK CODE TO COPY LINK</span>
      <span class="hint">WAITING FOR OPPONENT...</span>
    </div>
    <div id="status"></div>
  </div>

  <div id="game">
    <div id="hud">
      <div class="hud-player">
        <div class="hud-label">YOU</div>
        <div class="hud-score" id="score-me">0</div>
        <div class="hud-combo" id="combo-me"></div>
      </div>
      <div class="hud-center">VS</div>
      <div class="hud-player" style="text-align:right">
        <div class="hud-label">THEM</div>
        <div class="hud-score" id="score-opp">0</div>
        <div class="hud-combo" id="combo-opp"></div>
      </div>
    </div>
    <div id="overlay-wrap">
      <canvas id="gameCanvas"></canvas>
      <div id="overlay">
        <div id="overlay-title"></div>
        <div id="overlay-sub"></div>
        <button id="btn-restart" style="margin-top:6px">PLAY AGAIN</button>
      </div>
    </div>
    <div class="controls-hint">WASD / ARROW KEYS &nbsp;·&nbsp; BOTH PRESS PLAY AGAIN TO RESTART</div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="/src/index.ts"></script>
</body>

</html>
